<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3年生</title>
  <style>
    :root {
      --bg-1: #f4f8ff;
      --bg-2: #eaf2ff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #172033;
      --muted: #61708a;
      --line: #dbe5f4;
      --accent: #3b82f6;
      --accent-2: #2563eb;
      --shadow: 0 18px 45px rgba(37, 99, 235, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      padding: 32px 18px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.96), rgba(37, 99, 235, 0.96));
      color: white;
      border-radius: 28px;
      padding: 30px 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -60px auto;
      width: 220px;
      height: 220px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 680px;
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.92);
    }

    .section-title {
      margin: 28px 4px 14px;
      font-size: 1.05rem;
      font-weight: 800;
      color: #24324d;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(219, 229, 244, 0.95);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
      backdrop-filter: blur(8px);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 38px rgba(23, 32, 51, 0.12);
      border-color: #bfd4fb;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      background: #e8f1ff;
      color: var(--accent-2);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.3rem;
      line-height: 1.3;
    }

    .desc {
      margin: 0 0 18px;
      font-size: 0.96rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      padding: 12px 16px;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    .button:hover {
      filter: brightness(1.05);
    }

    .note {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: #4a5972;
      font-size: 0.93rem;
    }

    .future-links {
      display: none;
    }

    footer {
      margin-top: 18px;
      text-align: center;
      font-size: 0.9rem;
      color: #6b7a94;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 14px;
      }

      .hero,
      .card {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
<main class="wrap">
    <section class="hero">
      <div class="eyebrow">English Practice Links</div>
      <h1>3年生</h1>
    </section>

    <h2 class="section-title">Available Now</h2>
    <section class="grid" aria-label="Available activities">
      <article class="card">
        <div class="tag">Featured</div>
        <h2>NEW RPG GAME</h2>
<a class="button" href="https://vexavi.github.io/3nenseiexpansion/" target="_blank" rel="noopener">
          Open Activity →
        </a>
      </article>
    </section>
<!-- Temporarily hidden for later use -->
    <section class="future-links" aria-hidden="true">
      <article>
        <h2>Quizlet：マッチゲーム</h2>
        <p>カードを素早く合わせるスピードゲーム。</p>
        <a href="https://quizlet.com/1141909006/match" target="_blank" rel="noopener">Open</a>
      </article>

      <article>
        <h2>Quizlet：フラッシュカード</h2>
        <p>フラッシュカードで英単語を確認。</p>
        <a href="https://quizlet.com/1141909006/flashcards" target="_blank" rel="noopener">Open</a>
      </article>

      <article>
        <h2>Writing Vocab Practice</h2>
        <p>Practice writing the english words.</p>
        <a href="https://vexavi.github.io/3nenseiwritingvocabdrill/" target="_blank" rel="noopener">Open</a>
      </article>
    </section>
</main>
</body>
</html>
