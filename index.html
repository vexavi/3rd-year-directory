<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3rd Year Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-a: #fff5dd;
      --bg-b: #ffe1c4;
      --bg-c: #ffd1dc;
      --card: rgba(255, 255, 255, 0.72);
      --card-strong: rgba(255, 255, 255, 0.92);
      --stroke: rgba(137, 75, 36, 0.18);
      --text: #382214;
      --muted: #865f43;
      --orange: #ff8a3d;
      --rose: #ff5d7d;
      --violet: #8b5cf6;
      --gold: #ffc83d;
      --shadow: rgba(120, 58, 24, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 200, 61, 0.42), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(255, 93, 125, 0.30), transparent 30%),
        radial-gradient(circle at 44% 98%, rgba(139, 92, 246, 0.20), transparent 34%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(56, 34, 20, 0.12) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255,255,255,0.30), transparent 45%);
      background-size: 22px 22px, 100% 100%;
      opacity: 0.62;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 34px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.52);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255, 138, 61, 0.96), rgba(255, 93, 125, 0.92) 58%, rgba(139, 92, 246, 0.88));
      box-shadow: 0 24px 70px var(--shadow);
      padding: 30px;
      margin-bottom: 18px;
      color: #fffdf8;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 23px;
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      right: -115px;
      top: -120px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.34), transparent 58%),
        radial-gradient(circle at 35% 35%, rgba(255,200,61,0.42), transparent 46%);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.92);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.20);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 16px rgba(255, 200, 61, 0.9);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 18px 0 0;
      font-size: clamp(2.15rem, 8vw, 5.1rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      text-shadow: 0 12px 32px rgba(80, 24, 12, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      display: flex;
      min-height: 148px;
      align-items: flex-end;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: 28px;
      background:
        linear-gradient(145deg, var(--card-strong), var(--card)),
        rgba(255,255,255,0.62);
      box-shadow: 0 18px 42px rgba(120, 58, 24, 0.13);
      padding: 21px;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.86;
      background:
        radial-gradient(circle at 18% 18%, var(--glow), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.46), transparent 56%);
      pointer-events: none;
    }

    .card::after {
      content: "OPEN";
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 999px;
      background: rgba(255,255,255,0.48);
      color: rgba(56,34,20,0.70);
      font-size: 0.68rem;
      font-weight: 950;
      letter-spacing: 0.14em;
      box-shadow: 0 8px 18px rgba(120,58,24,0.08);
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-5px) rotate(-0.4deg);
      border-color: rgba(255, 138, 61, 0.44);
      box-shadow: 0 24px 60px rgba(120, 58, 24, 0.20);
      outline: none;
    }

    .card-title {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.35rem, 4vw, 2.1rem);
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .icon {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(255,255,255,0.48));
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 12px 24px rgba(120,58,24,0.10);
      font-size: 1.45rem;
    }

    .match { --glow: rgba(255, 200, 61, 0.56); }
    .flash { --glow: rgba(255, 93, 125, 0.38); }
    .writing { --glow: rgba(139, 92, 246, 0.32); }
    .typing { --glow: rgba(60, 196, 255, 0.34); }

    footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(56,34,20,0.52);
      font-size: 0.78rem;
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 24px, 980px);
        padding-top: 20px;
      }

      .hero {
        padding: 24px;
        border-radius: 25px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Page title">
      <div class="eyebrow"><span class="dot" aria-hidden="true"></span>Practice Directory</div>
      <h1>3rd Year Practice</h1>
    </section>

    <section class="grid" aria-label="Practice links">
      <a class="card match" href="https://quizlet.com/1179355058/match" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">⚡</span>Match Game</span>
      </a>

      <a class="card flash" href="https://quizlet.com/1179355058/flashcards" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">🃏</span>Flash Card</span>
      </a>

      <a class="card writing" href="https://vexavi.github.io/3nenseiwritingvocabdrill/" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">✍️</span>Writing Practice</span>
      </a>

      <a class="card typing" href="https://vexavi.github.io/123typinggame/" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">⌨️</span>Typing game</span>
      </a>
    </section>

    <footer>&copy; 2026 3rd Year Practice</footer>
  </main>
</body>
</html>
